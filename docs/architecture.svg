<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="920" viewBox="0 0 1360 920" role="img" aria-labelledby="title desc">
  <title id="title">feedback-hub architecture</title>
  <desc id="desc">feedback-hub architecture showing repo-local integration, hub-owned canonical text artifacts, optional automation, and rebuildable derived state.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4A4A4A" />
    </marker>
    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.08" />
    </filter>
  </defs>
  <rect x="0" y="0" width="1360" height="920" fill="#F7F4EE" />
  <text x="32" y="46" font-family="Helvetica, Arial, sans-serif" font-size="32" font-weight="700" fill="#1F1F1F">feedback-hub architecture</text>
  <text x="32" y="76" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#5A5A5A">feedback-hub architecture showing repo-local integration, hub-owned canonical text artifacts, optional automation, and rebuildable derived state.</text>
  <rect x="24" y="86" width="400" height="540" rx="24" fill="#FFFFFF" stroke="#D1CCC1" stroke-width="1.5" filter="url(#card-shadow)" />
  <text x="48" y="120" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#393939">Project-facing shell</text>
  <text x="48" y="144" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#6A6A6A">repo-local integration, capture, and consultation</text>
  <rect x="452" y="86" width="430" height="540" rx="24" fill="#FFFFFF" stroke="#D1CCC1" stroke-width="1.5" filter="url(#card-shadow)" />
  <text x="476" y="120" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#393939">Hub-owned canonical text artifacts</text>
  <text x="476" y="144" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#6A6A6A">the source of truth lives in text, not in caches</text>
  <rect x="910" y="86" width="426" height="540" rx="24" fill="#FFFFFF" stroke="#D1CCC1" stroke-width="1.5" filter="url(#card-shadow)" />
  <text x="934" y="120" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#393939">Automation and rebuildable state</text>
  <text x="934" y="144" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#6A6A6A">optional curation plus fast lookup surfaces</text>
  <line x1="224" y1="250" x2="136" y2="310" stroke="#4A4A4A" stroke-width="2.5" marker-end="url(#arrow)" />
  <rect x="79" y="255" width="178" height="24" rx="12" fill="#FBFBFB" stroke="#E2DED6" stroke-width="1" />
  <text x="168" y="272" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#333333">local feedback surface</text>
  <line x1="224" y1="250" x2="314" y2="310" stroke="#4A4A4A" stroke-width="2.5" marker-end="url(#arrow)" />
  <rect x="189" y="255" width="185" height="24" rx="12" fill="#FBFBFB" stroke="#E2DED6" stroke-width="1" />
  <text x="281" y="272" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#333333">local learnings surface</text>
  <line x1="136" y1="420" x2="136" y2="470" stroke="#4A4A4A" stroke-width="2.5" marker-end="url(#arrow)" />
  <rect x="31" y="420" width="122" height="24" rx="12" fill="#FBFBFB" stroke="#E2DED6" stroke-width="1" />
  <text x="92" y="437" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#333333">apply, capture</text>
  <line x1="314" y1="420" x2="314" y2="470" stroke="#4A4A4A" stroke-width="2.5" marker-end="url(#arrow)" />
  <rect x="301" y="420" width="143" height="24" rx="12" fill="#FBFBFB" stroke="#E2DED6" stroke-width="1" />
  <text x="372" y="437" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#333333">search, recommend</text>
  <line x1="212" y1="528" x2="500" y2="202" stroke="#4A4A4A" stroke-width="2.5" marker-end="url(#arrow)" />
  <rect x="258" y="330" width="157" height="24" rx="12" fill="#FBFBFB" stroke="#E2DED6" stroke-width="1" />
  <text x="336" y="347" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#333333">write raw artifacts</text>
  <line x1="500" y1="392" x2="832" y2="202" stroke="#4A4A4A" stroke-width="2.5" marker-end="url(#arrow)" />
  <rect x="540" y="260" width="213" height="24" rx="12" fill="#FBFBFB" stroke="#E2DED6" stroke-width="1" />
  <text x="646" y="277" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#333333">review promotion candidates</text>
  <line x1="1034" y1="258" x2="666" y2="328" stroke="#4A4A4A" stroke-width="2.5" marker-end="url(#arrow)" />
  <rect x="746" y="258" width="185" height="24" rx="12" fill="#FBFBFB" stroke="#E2DED6" stroke-width="1" />
  <text x="838" y="275" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#333333">schedule review batches</text>
  <line x1="1136" y1="199" x2="832" y2="391" stroke="#4A4A4A" stroke-width="2.5" marker-end="url(#arrow)" />
  <rect x="885" y="266" width="234" height="24" rx="12" fill="#FBFBFB" stroke="#E2DED6" stroke-width="1" />
  <text x="1002" y="283" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#333333">user-configured review backend</text>
  <line x1="666" y1="454" x2="666" y2="516" stroke="#4A4A4A" stroke-width="2.5" marker-end="url(#arrow)" />
  <rect x="588" y="460" width="157" height="24" rx="12" fill="#FBFBFB" stroke="#E2DED6" stroke-width="1" />
  <text x="666" y="477" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#333333">approve and promote</text>
  <line x1="832" y1="579" x2="958" y2="391" stroke="#4A4A4A" stroke-width="2.5" marker-end="url(#arrow)" />
  <rect x="827" y="452" width="157" height="24" rx="12" fill="#FBFBFB" stroke="#E2DED6" stroke-width="1" />
  <text x="905" y="469" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#333333">index, profile, log</text>
  <line x1="500" y1="579" x2="392" y2="365" stroke="#4A4A4A" stroke-width="2.5" marker-end="url(#arrow)" />
  <rect x="346" y="431" width="185" height="24" rx="12" fill="#FBFBFB" stroke="#E2DED6" stroke-width="1" />
  <text x="438" y="448" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#333333">shared read-only memory</text>
  <line x1="958" y1="391" x2="392" y2="528" stroke="#4A4A4A" stroke-width="2.5" marker-end="url(#arrow)" />
  <rect x="623" y="444" width="185" height="24" rx="12" fill="#FBFBFB" stroke="#E2DED6" stroke-width="1" />
  <text x="715" y="461" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#333333">serve fast local lookup</text>
  <line x1="392" y1="528" x2="224" y2="250" stroke="#4A4A4A" stroke-width="2.5" marker-end="url(#arrow)" />
  <rect x="204" y="382" width="185" height="24" rx="12" fill="#FBFBFB" stroke="#E2DED6" stroke-width="1" />
  <text x="296" y="399" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#333333">recommend, adopt, defer</text>
  <rect x="56" y="140" width="336" height="110" rx="20" fill="#EAF4EC" stroke="#3B7A57" stroke-width="2.5" filter="url(#card-shadow)" />
  <text x="224" y="176" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" fill="#1F1F1F">
    <tspan x="224" dy="0" font-size="18" font-weight="700">Integrated project repos</tspan>
    <tspan x="224" dy="24" font-size="16" font-weight="400">the developer works in a normal project repo</tspan>
    <tspan x="224" dy="24" font-size="16" font-weight="400">feedback-hub integrates repo-local entrypoints</tspan>
  </text>
  <rect x="56" y="310" width="156" height="110" rx="20" fill="#F5F4E8" stroke="#7B7347" stroke-width="2.5" filter="url(#card-shadow)" />
  <text x="134" y="346" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" fill="#1F1F1F">
    <tspan x="134" dy="0" font-size="18" font-weight="700">repo-local</tspan>
    <tspan x="134" dy="24" font-size="16" font-weight="400">feedback/</tspan>
    <tspan x="134" dy="24" font-size="16" font-weight="400">project-owned raw write surface</tspan>
  </text>
  <rect x="236" y="310" width="156" height="110" rx="20" fill="#EDF4FB" stroke="#496D8C" stroke-width="2.5" filter="url(#card-shadow)" />
  <text x="314" y="346" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" fill="#1F1F1F">
    <tspan x="314" dy="0" font-size="18" font-weight="700">repo-local</tspan>
    <tspan x="314" dy="24" font-size="16" font-weight="400">learnings/</tspan>
    <tspan x="314" dy="24" font-size="16" font-weight="400">shared read-only memory</tspan>
  </text>
  <rect x="56" y="470" width="156" height="116" rx="20" fill="#F8E6EF" stroke="#8E3B6F" stroke-width="2.5" filter="url(#card-shadow)" />
  <text x="134" y="506" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" fill="#1F1F1F">
    <tspan x="134" dy="0" font-size="18" font-weight="700">feedback CLI</tspan>
    <tspan x="134" dy="24" font-size="16" font-weight="400">apply integration</tspan>
    <tspan x="134" dy="24" font-size="16" font-weight="400">capture lessons</tspan>
    <tspan x="134" dy="24" font-size="16" font-weight="400">decisions and incidents</tspan>
  </text>
  <rect x="236" y="470" width="156" height="116" rx="20" fill="#E7F2F8" stroke="#2F6F91" stroke-width="2.5" filter="url(#card-shadow)" />
  <text x="314" y="506" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" fill="#1F1F1F">
    <tspan x="314" dy="0" font-size="18" font-weight="700">learnings CLI</tspan>
    <tspan x="314" dy="24" font-size="16" font-weight="400">index, search, recommend</tspan>
    <tspan x="314" dy="24" font-size="16" font-weight="400">show, related, adopt</tspan>
  </text>
  <rect x="500" y="140" width="332" height="126" rx="20" fill="#FFF2D9" stroke="#9D6C00" stroke-width="2.5" filter="url(#card-shadow)" />
  <text x="666" y="176" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" fill="#1F1F1F">
    <tspan x="666" dy="0" font-size="18" font-weight="700">Project feedback</tspan>
    <tspan x="666" dy="24" font-size="16" font-weight="400">project-owned raw lessons, decisions, incidents,</tspan>
    <tspan x="666" dy="24" font-size="16" font-weight="400">incoming guidance, and outgoing guidance</tspan>
    <tspan x="666" dy="24" font-size="16" font-weight="400">canonical write surface for new information</tspan>
  </text>
  <rect x="500" y="328" width="332" height="126" rx="20" fill="#F7EEE4" stroke="#8B6338" stroke-width="2.5" filter="url(#card-shadow)" />
  <text x="666" y="364" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" fill="#1F1F1F">
    <tspan x="666" dy="0" font-size="18" font-weight="700">Promotion review</tspan>
    <tspan x="666" dy="24" font-size="16" font-weight="400">select reusable cross-project material</tspan>
    <tspan x="666" dy="24" font-size="16" font-weight="400">approve only curated, generalized outputs</tspan>
  </text>
  <rect x="500" y="516" width="332" height="126" rx="20" fill="#E4F0FA" stroke="#2E6DA4" stroke-width="2.5" filter="url(#card-shadow)" />
  <text x="666" y="552" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" fill="#1F1F1F">
    <tspan x="666" dy="0" font-size="18" font-weight="700">Curated learnings</tspan>
    <tspan x="666" dy="24" font-size="16" font-weight="400">patterns, templates, and guidance</tspan>
    <tspan x="666" dy="24" font-size="16" font-weight="400">shared read-only memory for projects</tspan>
    <tspan x="666" dy="24" font-size="16" font-weight="400">promoted from approved project feedback</tspan>
  </text>
  <rect x="958" y="328" width="330" height="126" rx="20" fill="#EDEDED" stroke="#5E5E5E" stroke-width="2.5" filter="url(#card-shadow)" />
  <text x="1123" y="364" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" fill="#1F1F1F">
    <tspan x="1123" dy="0" font-size="18" font-weight="700">Derived state</tspan>
    <tspan x="1123" dy="24" font-size="16" font-weight="400">SQLite index, profiles, usage, and logs</tspan>
    <tspan x="1123" dy="24" font-size="16" font-weight="400">rebuildable from text artifacts</tspan>
    <tspan x="1123" dy="24" font-size="16" font-weight="400">not the source of truth</tspan>
  </text>
  <rect x="958" y="140" width="152" height="118" rx="20" fill="#F5F0E6" stroke="#7E6A3D" stroke-width="2.5" filter="url(#card-shadow)" />
  <text x="1034" y="176" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" fill="#1F1F1F">
    <tspan x="1034" dy="0" font-size="18" font-weight="700">Scheduler</tspan>
    <tspan x="1034" dy="24" font-size="16" font-weight="400">optional sync cadence</tspan>
    <tspan x="1034" dy="24" font-size="16" font-weight="400">separate from manual use</tspan>
  </text>
  <rect x="1136" y="140" width="152" height="118" rx="20" fill="#F5F0E6" stroke="#7E6A3D" stroke-width="2.5" filter="url(#card-shadow)" />
  <text x="1212" y="176" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" fill="#1F1F1F">
    <tspan x="1212" dy="0" font-size="18" font-weight="700">Backend adapter</tspan>
    <tspan x="1212" dy="24" font-size="16" font-weight="400">user-configured model or API</tspan>
    <tspan x="1212" dy="24" font-size="16" font-weight="400">replaceable by contract</tspan>
  </text>
  <rect x="110" y="700" width="1140" height="132" rx="20" fill="#FFFDF7" stroke="#AA9A6A" stroke-width="2" stroke-dasharray="8 6" />
  <text x="134" y="732" font-family="Helvetica, Arial, sans-serif" fill="#2B2B2B">
    <tspan x="134" dy="0" font-size="18" font-weight="700">Boundary rules captured by the architecture</tspan>
    <tspan x="134" dy="24" font-size="16" font-weight="400">Projects write only to project feedback. Projects never write curated learnings directly.</tspan>
    <tspan x="134" dy="24" font-size="16" font-weight="400">Curated learnings and project feedback are canonical text artifacts.</tspan>
    <tspan x="134" dy="24" font-size="16" font-weight="400">The index, usage logs, and profiles are rebuildable optimizations rather than the source of truth.</tspan>
  </text>
</svg>
