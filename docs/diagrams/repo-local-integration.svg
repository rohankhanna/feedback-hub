<svg xmlns="http://www.w3.org/2000/svg" width="1260" height="780" viewBox="0 0 1260 780" role="img" aria-labelledby="title desc">
  <title id="title">feedback-hub public architecture: repo-local integration</title>
  <desc id="desc">How an integrated project repo sees feedback-hub locally through project-owned feedback, shared learnings, and the two CLI surfaces.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4A4A4A" />
    </marker>
    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.08" />
    </filter>
  </defs>
  <rect x="0" y="0" width="1260" height="780" fill="#F7F4EE" />
  <text x="32" y="46" font-family="Helvetica, Arial, sans-serif" font-size="32" font-weight="700" fill="#1F1F1F">feedback-hub public architecture: repo-local integration</text>
  <text x="32" y="76" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#5A5A5A">How an integrated project repo sees feedback-hub locally through project-owned feedback, shared learnings, and the two CLI surfaces.</text>
  <rect x="36" y="104" width="1188" height="532" rx="24" fill="#FFFFFF" stroke="#D1CCC1" stroke-width="1.5" filter="url(#card-shadow)" />
  <text x="60" y="138" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#393939">Integrated project repo</text>
  <text x="60" y="162" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#6A6A6A">the public shell is meant to feel local inside a normal repository</text>
  <line x1="242" y1="290" x2="192" y2="370" stroke="#4A4A4A" stroke-width="2.5" marker-end="url(#arrow)" />
  <rect x="121" y="305" width="157" height="24" rx="12" fill="#FBFBFB" stroke="#E2DED6" stroke-width="1" />
  <text x="199" y="322" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#333333">project writes here</text>
  <line x1="242" y1="290" x2="470" y2="370" stroke="#4A4A4A" stroke-width="2.5" marker-end="url(#arrow)" />
  <rect x="305" y="305" width="150" height="24" rx="12" fill="#FBFBFB" stroke="#E2DED6" stroke-width="1" />
  <text x="380" y="322" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#333333">project reads here</text>
  <line x1="402" y1="230" x2="676" y2="250" stroke="#4A4A4A" stroke-width="2.5" marker-end="url(#arrow)" />
  <rect x="464" y="205" width="171" height="24" rx="12" fill="#FBFBFB" stroke="#E2DED6" stroke-width="1" />
  <text x="549" y="222" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#333333">use feedback commands</text>
  <line x1="402" y1="240" x2="958" y2="250" stroke="#4A4A4A" stroke-width="2.5" marker-end="url(#arrow)" />
  <rect x="615" y="238" width="178" height="24" rx="12" fill="#FBFBFB" stroke="#E2DED6" stroke-width="1" />
  <text x="704" y="255" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#333333">use learnings commands</text>
  <line x1="302" y1="430" x2="676" y2="444" stroke="#4A4A4A" stroke-width="2.5" marker-end="url(#arrow)" />
  <rect x="411" y="396" width="157" height="24" rx="12" fill="#FBFBFB" stroke="#E2DED6" stroke-width="1" />
  <text x="489" y="413" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#333333">capture and inspect</text>
  <line x1="580" y1="430" x2="676" y2="444" stroke="#4A4A4A" stroke-width="2.5" marker-end="url(#arrow)" />
  <rect x="591" y="438" width="171" height="24" rx="12" fill="#FBFBFB" stroke="#E2DED6" stroke-width="1" />
  <text x="676" y="455" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#333333">consult shared memory</text>
  <rect x="82" y="168" width="320" height="122" rx="20" fill="#EAF4EC" stroke="#3B7A57" stroke-width="2.5" filter="url(#card-shadow)" />
  <text x="242" y="204" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" fill="#1F1F1F">
    <tspan x="242" dy="0" font-size="18" font-weight="700">Developer working tree</tspan>
    <tspan x="242" dy="24" font-size="16" font-weight="400">normal project repository</tspan>
    <tspan x="242" dy="24" font-size="16" font-weight="400">feedback-hub adds local entrypoints</tspan>
  </text>
  <rect x="82" y="370" width="220" height="120" rx="20" fill="#FFF2D9" stroke="#9D6C00" stroke-width="2.5" filter="url(#card-shadow)" />
  <text x="192" y="406" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" fill="#1F1F1F">
    <tspan x="192" dy="0" font-size="18" font-weight="700">feedback/</tspan>
    <tspan x="192" dy="24" font-size="16" font-weight="400">project-owned raw write surface</tspan>
    <tspan x="192" dy="24" font-size="16" font-weight="400">lessons, decisions, incidents</tspan>
  </text>
  <rect x="360" y="370" width="220" height="120" rx="20" fill="#E4F0FA" stroke="#2E6DA4" stroke-width="2.5" filter="url(#card-shadow)" />
  <text x="470" y="406" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" fill="#1F1F1F">
    <tspan x="470" dy="0" font-size="18" font-weight="700">learnings/</tspan>
    <tspan x="470" dy="24" font-size="16" font-weight="400">shared read-only lookup surface</tspan>
    <tspan x="470" dy="24" font-size="16" font-weight="400">curated cross-project memory</tspan>
  </text>
  <rect x="676" y="188" width="232" height="126" rx="20" fill="#F8E6EF" stroke="#8E3B6F" stroke-width="2.5" filter="url(#card-shadow)" />
  <text x="792" y="224" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" fill="#1F1F1F">
    <tspan x="792" dy="0" font-size="18" font-weight="700">feedback CLI</tspan>
    <tspan x="792" dy="24" font-size="16" font-weight="400">apply integration</tspan>
    <tspan x="792" dy="24" font-size="16" font-weight="400">capture project feedback</tspan>
    <tspan x="792" dy="24" font-size="16" font-weight="400">inspect repo status</tspan>
  </text>
  <rect x="958" y="188" width="218" height="126" rx="20" fill="#E7F2F8" stroke="#2F6F91" stroke-width="2.5" filter="url(#card-shadow)" />
  <text x="1067" y="224" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" fill="#1F1F1F">
    <tspan x="1067" dy="0" font-size="18" font-weight="700">learnings CLI</tspan>
    <tspan x="1067" dy="24" font-size="16" font-weight="400">index, search, recommend</tspan>
    <tspan x="1067" dy="24" font-size="16" font-weight="400">show related guidance</tspan>
    <tspan x="1067" dy="24" font-size="16" font-weight="400">record adopt or defer outcomes</tspan>
  </text>
  <rect x="676" y="384" width="500" height="120" rx="20" fill="#F5F0E6" stroke="#7E6A3D" stroke-width="2.5" filter="url(#card-shadow)" />
  <text x="926" y="420" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" fill="#1F1F1F">
    <tspan x="926" dy="0" font-size="18" font-weight="700">Typical local workflow</tspan>
    <tspan x="926" dy="24" font-size="16" font-weight="400">apply repo integration, capture raw feedback, rebuild the index,</tspan>
    <tspan x="926" dy="24" font-size="16" font-weight="400">then search or recommend curated learnings before substantive work</tspan>
  </text>
  <rect x="84" y="676" width="1092" height="72" rx="20" fill="#FFFDF7" stroke="#AA9A6A" stroke-width="2" stroke-dasharray="8 6" />
  <text x="108" y="708" font-family="Helvetica, Arial, sans-serif" fill="#2B2B2B">
    <tspan x="108" dy="0" font-size="18" font-weight="700">Boundary rule</tspan>
    <tspan x="108" dy="24" font-size="16" font-weight="400">Projects write raw feedback but do not write curated learnings directly. The public shell stays local-first and standalone.</tspan>
  </text>
</svg>
