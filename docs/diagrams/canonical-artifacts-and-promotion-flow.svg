<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc">
  <title id="title">feedback-hub public architecture: canonical artifacts and promotion flow</title>
  <desc id="desc">How raw project feedback becomes curated cross-project learnings through explicit review rather than direct project writes.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4A4A4A" />
    </marker>
    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.08" />
    </filter>
  </defs>
  <rect x="0" y="0" width="1280" height="820" fill="#F7F4EE" />
  <text x="32" y="46" font-family="Helvetica, Arial, sans-serif" font-size="32" font-weight="700" fill="#1F1F1F">feedback-hub public architecture: canonical artifacts and promotion flow</text>
  <text x="32" y="76" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#5A5A5A">How raw project feedback becomes curated cross-project learnings through explicit review rather than direct project writes.</text>
  <rect x="44" y="104" width="336" height="570" rx="24" fill="#FFFFFF" stroke="#D1CCC1" stroke-width="1.5" filter="url(#card-shadow)" />
  <text x="68" y="138" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#393939">Raw project feedback</text>
  <text x="68" y="162" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#6A6A6A">project-owned canonical write surface</text>
  <rect x="472" y="104" width="336" height="570" rx="24" fill="#FFFFFF" stroke="#D1CCC1" stroke-width="1.5" filter="url(#card-shadow)" />
  <text x="496" y="138" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#393939">Promotion review</text>
  <text x="496" y="162" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#6A6A6A">explicit selection and generalization</text>
  <rect x="900" y="104" width="336" height="570" rx="24" fill="#FFFFFF" stroke="#D1CCC1" stroke-width="1.5" filter="url(#card-shadow)" />
  <text x="924" y="138" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#393939">Curated learnings</text>
  <text x="924" y="162" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#6A6A6A">shared read-only cross-project memory</text>
  <line x1="340" y1="248" x2="512" y2="274" stroke="#4A4A4A" stroke-width="2.5" marker-end="url(#arrow)" />
  <rect x="340" y="218" width="185" height="24" rx="12" fill="#FBFBFB" stroke="#E2DED6" stroke-width="1" />
  <text x="432" y="235" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#333333">candidate for promotion</text>
  <line x1="340" y1="472" x2="512" y2="478" stroke="#4A4A4A" stroke-width="2.5" marker-end="url(#arrow)" />
  <rect x="365" y="434" width="143" height="24" rx="12" fill="#FBFBFB" stroke="#E2DED6" stroke-width="1" />
  <text x="436" y="451" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#333333">retain provenance</text>
  <line x1="768" y1="274" x2="940" y2="281" stroke="#4A4A4A" stroke-width="2.5" marker-end="url(#arrow)" />
  <rect x="782" y="234" width="157" height="24" rx="12" fill="#FBFBFB" stroke="#E2DED6" stroke-width="1" />
  <text x="860" y="251" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#333333">approve and promote</text>
  <line x1="768" y1="478" x2="940" y2="496" stroke="#4A4A4A" stroke-width="2.5" marker-end="url(#arrow)" />
  <rect x="803" y="444" width="122" height="24" rx="12" fill="#FBFBFB" stroke="#E2DED6" stroke-width="1" />
  <text x="864" y="461" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#333333">do not promote</text>
  <line x1="1068" y1="354" x2="1068" y2="430" stroke="#4A4A4A" stroke-width="2.5" marker-end="url(#arrow)" />
  <rect x="1068" y="367" width="164" height="24" rx="12" fill="#FBFBFB" stroke="#E2DED6" stroke-width="1" />
  <text x="1150" y="384" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#333333">shared read-only use</text>
  <rect x="84" y="172" width="256" height="150" rx="20" fill="#FFF2D9" stroke="#9D6C00" stroke-width="2.5" filter="url(#card-shadow)" />
  <text x="212" y="208" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" fill="#1F1F1F">
    <tspan x="212" dy="0" font-size="18" font-weight="700">Raw project artifacts</tspan>
    <tspan x="212" dy="24" font-size="16" font-weight="400">lessons</tspan>
    <tspan x="212" dy="24" font-size="16" font-weight="400">decisions</tspan>
    <tspan x="212" dy="24" font-size="16" font-weight="400">incidents</tspan>
    <tspan x="212" dy="24" font-size="16" font-weight="400">incoming and outgoing guidance</tspan>
  </text>
  <rect x="84" y="404" width="256" height="138" rx="20" fill="#F7EEE4" stroke="#8B6338" stroke-width="2.5" filter="url(#card-shadow)" />
  <text x="212" y="440" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" fill="#1F1F1F">
    <tspan x="212" dy="0" font-size="18" font-weight="700">Auditability rule</tspan>
    <tspan x="212" dy="24" font-size="16" font-weight="400">promoted learnings should remain</tspan>
    <tspan x="212" dy="24" font-size="16" font-weight="400">traceable back to source artifacts</tspan>
  </text>
  <rect x="512" y="208" width="256" height="132" rx="20" fill="#F5F0E6" stroke="#7E6A3D" stroke-width="2.5" filter="url(#card-shadow)" />
  <text x="640" y="244" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" fill="#1F1F1F">
    <tspan x="640" dy="0" font-size="18" font-weight="700">Review gate</tspan>
    <tspan x="640" dy="24" font-size="16" font-weight="400">select only reusable material</tspan>
    <tspan x="640" dy="24" font-size="16" font-weight="400">generalize and sanitize before promotion</tspan>
  </text>
  <rect x="512" y="412" width="256" height="132" rx="20" fill="#EDEDED" stroke="#5E5E5E" stroke-width="2.5" filter="url(#card-shadow)" />
  <text x="640" y="448" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" fill="#1F1F1F">
    <tspan x="640" dy="0" font-size="18" font-weight="700">Non-promotion path</tspan>
    <tspan x="640" dy="24" font-size="16" font-weight="400">artifacts can stay project-local</tspan>
    <tspan x="640" dy="24" font-size="16" font-weight="400">without entering shared memory</tspan>
  </text>
  <rect x="940" y="208" width="256" height="146" rx="20" fill="#E4F0FA" stroke="#2E6DA4" stroke-width="2.5" filter="url(#card-shadow)" />
  <text x="1068" y="244" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" fill="#1F1F1F">
    <tspan x="1068" dy="0" font-size="18" font-weight="700">Curated learnings</tspan>
    <tspan x="1068" dy="24" font-size="16" font-weight="400">patterns</tspan>
    <tspan x="1068" dy="24" font-size="16" font-weight="400">templates</tspan>
    <tspan x="1068" dy="24" font-size="16" font-weight="400">reviewed cross-project guidance</tspan>
  </text>
  <rect x="940" y="430" width="256" height="132" rx="20" fill="#EAF4EC" stroke="#3B7A57" stroke-width="2.5" filter="url(#card-shadow)" />
  <text x="1068" y="466" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" fill="#1F1F1F">
    <tspan x="1068" dy="0" font-size="18" font-weight="700">Consumer rule</tspan>
    <tspan x="1068" dy="24" font-size="16" font-weight="400">projects read curated learnings</tspan>
    <tspan x="1068" dy="24" font-size="16" font-weight="400">but do not write them directly</tspan>
  </text>
  <rect x="108" y="714" width="1060" height="70" rx="20" fill="#FFFDF7" stroke="#AA9A6A" stroke-width="2" stroke-dasharray="8 6" />
  <text x="132" y="746" font-family="Helvetica, Arial, sans-serif" fill="#2B2B2B">
    <tspan x="132" dy="0" font-size="18" font-weight="700">Design rule</tspan>
    <tspan x="132" dy="24" font-size="16" font-weight="400">The source of truth stays in text artifacts. Promotion is explicit. Shared memory quality comes from review rather than direct project writes.</tspan>
  </text>
</svg>
